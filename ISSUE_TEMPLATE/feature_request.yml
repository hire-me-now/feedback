name: 💡 Feature request
description: Suggest an improvement or a new capability
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: What are you trying to do that's hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: What would you like?
      description: Describe the feature or change.
    validations:
      required: true
  - type: textarea
    id: alt
    attributes:
      label: Alternatives you've tried or considered (optional)
